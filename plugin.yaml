schema_version: "2.0"
id: evo-essentials
name: Evo Essentials
version: 1.1.7
description: >
  Reference plugin for EvoNexus v2. Demonstrates one of every capability —
  agents, skills, rules, UI pages, widgets, writable_data, readonly_data,
  claude_hooks, integrations, mcp_servers, heartbeats, routines — so plugin
  authors have a working example for each surface. Domain: personal notes.
author: Evolution Foundation <contato@evolutionfoundation.com.br>
license: MIT
homepage: https://github.com/EvolutionAPI/evonexus-plugin-evo-essentials
min_evonexus_version: 0.34.0
tier: essential

capabilities:
  - agents
  - skills
  - rules
  - sql_migrations
  - ui_pages
  - widgets
  - readonly_data
  - writable_data
  - claude_hooks
  - heartbeats

ui_entry_points:
  pages:
    - id: notes
      label: Notes
      path: notes
      bundle: dist/pages/notes.js
      sidebar_group: evo-essentials-group
      icon: StickyNote
      order: 1
    - id: notes-list
      label: Notes List
      path: notes-list
      bundle: dist/pages/notes-list.js
      sidebar_group: evo-essentials-group
      icon: List
      order: 2
  sidebar_groups:
    - id: evo-essentials-group
      label: Essentials
      order: 10
      collapsible: true
  widgets:
    - id: pinned-notes
      label: Pinned Notes
      filename: pinned-notes.js
      custom_element_name: evo-essentials-pinned-notes
      mount_point: overview

writable_data:
  - id: notes
    description: Personal notes with title, body, priority, pinned flag and due date.
    table: evo_essentials_notes
    allowed_columns:
      - title
      - body
      - priority
      - pinned
      - due_date
    json_schema:
      type: object
      properties:
        title:
          type: string
          title: Title
          minLength: 1
          maxLength: 200
        body:
          type: string
          title: Body
          description: Note content
        priority:
          type: string
          title: Priority
          enum:
            - low
            - medium
            - high
        pinned:
          type: boolean
          title: Pinned
          description: Show this note on the home widget
        due_date:
          type: string
          title: Due Date
          format: date
      required:
        - title
        - priority

readonly_data:
  - id: pinned_notes_count
    description: Count of pinned notes for the home widget.
    sql: >
      SELECT COUNT(*) AS count FROM evo_essentials_notes WHERE pinned = TRUE
  - id: notes_by_priority
    description: Note counts grouped by priority.
    sql: >
      SELECT priority, COUNT(*) AS count
      FROM evo_essentials_notes
      GROUP BY priority
      ORDER BY priority
  - id: notes_all
    description: All notes ordered by priority (high first) and recency.
    sql: >
      SELECT id, title, body, priority, pinned, due_date, created_at
      FROM evo_essentials_notes
      ORDER BY
        CASE priority WHEN 'high' THEN 3 WHEN 'medium' THEN 2 ELSE 1 END DESC,
        created_at DESC

agents:
  - name: notes-agent
    file: agents/notes-agent.md
    src: agents/notes-agent.md

skills:
  - name: create-note
    src: skills/create-note.md

rules:
  - name: notes-conventions
    src: rules/notes-conventions.md

claude_hooks:
  - event: PostToolUse
    handler_path: hooks/log-tool-use.py

integrations:
  - slug: notes-export
    label: Notes Export Webhook
    category: productivity
    env_vars:
      - name: NOTES_EXPORT_WEBHOOK_URL
        description: Webhook called whenever a high-priority note is created.
        required: false
        secret: false
      - name: NOTES_EXPORT_API_KEY
        description: Bearer token for the webhook above (if it requires auth).
        required: false
        secret: true

mcp_servers:
  - name: notes-fs
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "${PLUGIN_DIR}"
    env: {}
